name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry and Dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry install --no-root || true
      - name: Run Linting
        run: echo "Running lint..."

  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: gitleaks.toml
          report-path: artifacts/gitleaks-report.json
          verbose: true

  sca-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy FS Scan (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          output: "artifacts/trivy-fs-report.json"
      - name: Block on Critical
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL"
          exit-code: "1"

  sbom-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: "."
          format: "cyclonedx-json"
          output-file: "artifacts/sbom.json"

  build-and-scan-image:
    runs-on: ubuntu-latest
    needs: [secret-detection, sca-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build Local Docker Image
        run: |
          docker build -t myapp:${{ github.sha }} . || echo "Stub build"
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "myapp:${{ github.sha }}"
          format: "json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          output: "artifacts/trivy-image-report.json"